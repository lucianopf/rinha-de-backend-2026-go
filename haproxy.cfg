global
    log stdout format raw local0
    maxconn 65536
    daemon
    nbthread 2

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 2s
    timeout client 3s
    timeout server 2s

frontend api
    bind *:9999
    maxconn 65536
    default_backend apis

backend apis
    balance leastconn
    server api1 api1:8080 check inter 3s maxconn 32768
    server api2 api2:8080 check inter 3s maxconn 32768
