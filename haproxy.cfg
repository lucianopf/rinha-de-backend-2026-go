global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 2s
    timeout client 3s
    timeout server 2s
    timeout http-request 2s

frontend api
    bind *:9999
    default_backend apis

backend apis
    balance roundrobin
    server api1 api1:8080 check inter 1s
    server api2 api2:8080 check inter 1s
