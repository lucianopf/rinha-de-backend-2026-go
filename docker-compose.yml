services:
  api1:
    image: ghcr.io/lucianopf/rinha-de-backend-2026-go:latest
    command: ["./server", "--port", "8080", "--model", "resources/model.bin"]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"
    networks:
      - rinha
    restart: unless-stopped

  api2:
    image: ghcr.io/lucianopf/rinha-de-backend-2026-go:latest
    command: ["./server", "--port", "8080", "--model", "resources/model.bin"]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"
    networks:
      - rinha
    restart: unless-stopped

  lb:
    image: ghcr.io/lucianopf/rinha-de-backend-2026-go:latest
    command: ["./lb", "--listen", ":9999", "--timeout", "3s"]
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"
    networks:
      - rinha
    depends_on:
      - api1
      - api2

networks:
  rinha:
    driver: bridge
