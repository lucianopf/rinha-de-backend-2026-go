global
    log stdout format raw local0
    maxconn 4096
    daemon
    nbthread 1
    tune.bufsize 16384

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-keep-alive
    timeout connect 5s
    timeout client 10s
    timeout server 10s
    timeout http-request 10s
    timeout http-keep-alive 60s
    timeout queue 5s

frontend api
    bind *:9999
    maxconn 2000
    default_backend apis

backend apis
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200
    default-server inter 2s fastinter 1s downinter 5s fall 2 rise 2
    server api1 api1:8080 check
    server api2 api2:8080 check
